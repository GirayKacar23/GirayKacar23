<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Fırtına Modu V2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #6495ED;
            --neon-bordo: #ff0000;
            --neon-mavi: #00ffff;
            --zemin: #030303;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background-color: var(--zemin); color: white; overflow-x: hidden; }

        /* ========================================= */
        /* CANLI AKIŞKAN ARKA PLAN VE DOKU           */
        /* ========================================= */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            background: linear-gradient(135deg, #050505 0%, #1a0000 50%, #00081a 100%);
            background-size: 400% 400%; animation: fluidBG 15s ease infinite;
        }

        /* Factory/Doku Katmanı */
        .texture-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4MDAwMDAiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            opacity: 0.3;
        }

        @keyframes fluidBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Parçacık Katmanı */
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }

        /* ========================================= */
        /* GİRİŞ EKRANI (LOADER)                     */
        /* ========================================= */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background-color: var(--zemin); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease-out;
        }

        .welcome-text { 
            font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; 
            text-shadow: 0 0 20px var(--mavi); margin-bottom: 10px; 
            animation: bounceIn 1s ease;
        }
        .loading-text { font-size: 1.2rem; color: var(--neon-mavi); letter-spacing: 8px; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ========================================= */
        /* ANA İÇERİK                                */
        /* ========================================= */
        #content {
            display: none; opacity: 0; width: 90%; max-width: 450px;
            text-align: center; margin: 40px auto; transition: opacity 1s ease-in;
        }

        h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 40px; text-shadow: 2px 2px 0px var(--bordo), -2px -2px 0px var(--mavi); text-transform: uppercase; }

        /* ========================================= */
        /* NEON DÖNEN IŞIKLI BUTONLAR                */
        /* ========================================= */
        .btn {
            position: relative; display: flex; align-items: center;
            color: white; text-decoration: none; margin-bottom: 25px;
            padding: 22px; border-radius: 15px; font-weight: 700;
            background: rgba(10, 10, 10, 0.85); overflow: hidden; transition: 0.3s;
            backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05);
        }

        .btn i { margin-right: 20px; font-size: 1.6rem; width: 40px; text-align: center; }

        /* Neon Dönen Kenar */
        .btn::before {
            content: ''; position: absolute; top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotate 3s linear infinite; z-index: -1;
        }

        .btn::after { content: ''; position: absolute; inset: 3px; background: #0f0f0f; border-radius: 12px; z-index: -1; }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(100, 149, 237, 0.4); border-color: rgba(100, 149, 237, 0.5); }

        /* İkon Renkleri */
        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
        .bm-icon { color: var(--mavi); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="welcome-text">HOŞ GELDİNİZ</div>
        <div class="loading-text">YÜKLENİYOR...</div>
    </div>

    <div class="bg-layer"></div>
    <div class="texture-layer"></div>
    <div id="particles-js"></div>

    <div id="content">
        <h1>GİRAY KAÇAR</h1>

        <a href="https://kick.com/remzigiraykacar" class="btn" target="_blank">
            <i class="fa-solid fa-bolt kick-icon"></i> 1 KİCK KANALIM
        </a>
        <a href="https://www.instagram.com/giraykacarr?igsh=MXJoMGVhenJ4anB3NQ==" class="btn" target="_blank">
            <i class="fa-brands fa-instagram insta-icon"></i> 2 INSTAGRAM HESABIM
        </a>
        <a href="https://www.instagram.com/remzigiraykacar?igsh=MWdhanBwdzJzemc0Mg==" class="btn" target="_blank">
            <i class="fa-brands fa-square-instagram insta-icon"></i> 3 YOUTUBE KANAL INSTAGRAM
        </a>
        <a href="https://m.youtube.com/%40remzigiraykacar23?fbclid=PAb21jcARaTnFleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAac2StlFZr8dTPU8Gk1fZqSabzbC8OCtffEKYHCTc2pPsk1EMARYJe87AjrAlw_aem_Z5l9kT59S94kHcpY2cdtig" class="btn" target="_blank">
            <i class="fa-brands fa-youtube yt-icon"></i> 4 YOUTUBE KANALIM
        </a>
        <a href="https://www.instagram.com/channel/AbbrjxNCkqs-cvzb/" class="btn" target="_blank">
            <i class="fa-solid fa-users bm-icon"></i> 5 INSTAGRAM TOPLULUK
        </a>
        <a href="https://www.instagram.com/1bordo1mavii?igsh=YWF4enV0ZG01NXc0" class="btn" target="_blank">
            <i class="fa-solid fa-star-half-stroke bm-icon" style="color: #800000;"></i> 6 1BORDO1MAVİİ
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // İNTERAKTİF PARÇACIK AYARLARI (Grab Efekti Aktif)
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 90, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#800000", "#6495ED"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "grab" }, // Fare üzerine gelince parçacıklar çekilir
                    "onclick": { "enable": true, "mode": "push" } // Tıklayınca parçacık fırlatır
                },
                "modes": {
                    "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } }
                }
            },
            "retina_detect": true
        });

        // Yüklenme Ekranı Scripti
        window.addEventListener("load", function() {
            setTimeout(() => {
                document.getElementById("loader").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("loader").style.display = "none";
                    const content = document.getElementById("content");
                    content.style.display = "block";
                    setTimeout(() => { content.style.opacity = "1"; }, 50);
                    document.body.style.overflow = "auto";
                }, 800);
            }, 2500); 
        });
    </script>
</body>
</html>
