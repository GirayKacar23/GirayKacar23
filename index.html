<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Resmi Sayfa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #1e3a8a;
            --neon-bordo: #ff1e1e;
            --neon-mavi: #00ffff;
            --beyaz: #ffffff;
            --kirmizi: #ff0000;
            --zemin: #000000;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--zemin); color: white; overflow-x: hidden; }

        /* ========================================= */
        /* ÖZEL NEONLU GİRİŞ EKRANI (LOADER)          */
        /* ========================================= */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background-color: var(--zemin);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 1s ease-out;
            text-align: center;
        }

        /* TÜRK BAYRAĞI VE KIRMIZI-BEYAZ NEON ÇERÇEVE */
        .flag-neon-container {
            position: relative;
            width: 200px; height: 140px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 60px; border-radius: 15px; overflow: hidden;
        }

        .flag-neon-container::before {
            content: ''; position: absolute; width: 300px; height: 300px;
            background: conic-gradient(var(--kirmizi), var(--beyaz), var(--kirmizi), var(--beyaz));
            animation: rotateNeon 3s linear infinite; z-index: 1;
        }

        .flag-neon-container::after {
            content: ''; position: absolute; inset: 4px;
            background: var(--zemin); border-radius: 12px; z-index: 2;
        }

        .turkish-flag {
            width: 120px; height: auto; z-index: 3;
            filter: drop-shadow(0 0 15px var(--kirmizi));
        }

        /* METİN VE BORDO-MAVİ NEON ÇERÇEVE */
        .text-neon-container {
            position: relative;
            padding: 25px 50px;
            border-radius: 20px; overflow: hidden;
            display: flex; flex-direction: column; gap: 5px;
        }

        .text-neon-container::before {
            content: ''; position: absolute; inset: 0;
            background: conic-gradient(var(--neon-bordo), var(--neon-mavi), var(--neon-bordo), var(--neon-mavi));
            animation: rotateNeon 4s linear infinite reverse; z-index: 1;
        }

        .text-neon-container::after {
            content: ''; position: absolute; inset: 4px;
            background: var(--zemin); border-radius: 16px; z-index: 2;
        }

        .welcome-text { 
            font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; 
            text-shadow: 0 0 15px var(--neon-mavi); position: relative; z-index: 3;
            text-transform: uppercase; margin: 0;
        }
        .loading-text { 
            font-size: 1rem; color: var(--neon-mavi); 
            letter-spacing: 5px; animation: pulse 1.5s infinite;
            position: relative; z-index: 3;
            text-transform: uppercase; margin: 0;
        }

        @keyframes rotateNeon { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ========================================= */
        /* ANA İÇERİK                                */
        /* ========================================= */
        #content {
            display: none; opacity: 0; width: 90%; max-width: 450px;
            text-align: center; margin: 40px auto; transition: opacity 1s ease-in;
        }

        h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 40px; text-shadow: 2px 2px 0px var(--bordo); text-transform: uppercase; }

        .btn {
            position: relative; display: flex; align-items: center;
            color: white; text-decoration: none; margin-bottom: 25px;
            padding: 22px; border-radius: 15px; font-weight: 700;
            background: rgba(10, 10, 10, 0.9); overflow: hidden; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .btn i { margin-right: 20px; font-size: 1.6rem; width: 40px; text-align: center; }
        .btn::before {
            content: ''; position: absolute; top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotateNeon 3s linear infinite; z-index: -1;
        }
        .btn::after { content: ''; position: absolute; inset: 3px; background: #0f0f0f; border-radius: 12px; z-index: -1; }

        .btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(0, 255, 255, 0.3); }

        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
        .bm-icon { color: var(--mavi); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="flag-neon-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" alt="Türk Bayrağı" class="turkish-flag">
        </div>

        <div class="text-neon-container">
            <div class="welcome-text">HOŞ GELDİNİZ</div>
            <div class="loading-text">YÜKLENİYOR...</div>
        </div>
    </div>

    <div id="content">
        <h1>GİRAY KAÇAR</h1>

        <a href="https://kick.com/remzigiraykacar" class="btn" target="_blank">
            <i class="fa-solid fa-bolt kick-icon"></i>  KİCK KANALIM
        </a>
        <a href="https://www.instagram.com/giraykacarr?igsh=MXJoMGVhenJ4anB3NQ==" class="btn" target="_blank">
            <i class="fa-brands fa-instagram insta-icon"></i>  INSTAGRAM HESABIM
        </a>
        <a href="https://www.instagram.com/remzigiraykacar?igsh=MWdhanBwdzJzemc0Mg==" class="btn" target="_blank">
            <i class="fa-brands fa-square-instagram insta-icon"></i>  YOUTUBE KANAL INSTAGRAM
        </a>
        <a href="https://m.youtube.com/%40remzigiraykacar23" class="btn" target="_blank">
            <i class="fa-brands fa-youtube yt-icon"></i>  YOUTUBE KANALIM
        </a>
        <a href="https://www.instagram.com/channel/AbbrjxNCkqs-cvzb/" class="btn" target="_blank">
            <i class="fa-solid fa-users bm-icon"></i>  INSTAGRAM TOPLULUK
        </a>
        <a href="https://www.instagram.com/1bordo1mavii?igsh=YWF4enV0ZG01NXc0" class="btn" target="_blank">
            <i class="fa-solid fa-star-half-stroke bm-icon" style="color: #ff1e1e;"></i>  1BORDO1MAVİİ
        </a>
    </div>

    <script>
        // Yüklenme Ekranı Scripti (3 saniye sonra içerik açılır)
        window.addEventListener("load", function() {
            setTimeout(() => {
                const loader = document.getElementById("loader");
                const content = document.getElementById("content");
                
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    content.style.display = "block";
                    setTimeout(() => { content.style.opacity = "1"; }, 50);
                }, 1000);
            }, 3000); 
        });
    </script>
</body>
</html>
