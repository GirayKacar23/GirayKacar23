<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Papara Park</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #1e3a8a;
            --neon-bordo: #ff1e1e;
            --neon-mavi: #00ffff;
            --beyaz: #ffffff;
            --kirmizi: #ff0000;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background-color: #000; color: white; overflow-x: hidden; }

        /* ========================================= */
        /* GİRİŞ EKRANI (KESİN ÇALIŞAN SÜRÜM)         */
        /* ========================================= */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; background: #000; text-align: center; transition: opacity 0.8s ease;
        }

        /* Papara Park Arka Planı (Loader İçin) */
        .loader-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://paparapark.com.tr/wp-content/uploads/2023/09/papara-park-stadyum-dis.jpg') center/cover no-repeat;
            opacity: 0.3; z-index: -1;
        }

        /* Türk Bayrağı Neon Çerçeve */
        .flag-box {
            position: relative; width: 160px; height: 110px;
            display: flex; justify-content: center; align-items: center;
            margin-bottom: 40px; border-radius: 8px; overflow: hidden;
        }
        .flag-box::before {
            content: ''; position: absolute; width: 250px; height: 250px;
            background: conic-gradient(var(--kirmizi), var(--beyaz), var(--kirmizi), var(--beyaz));
            animation: rotate 3s linear infinite;
        }
        .flag-box::after { content: ''; position: absolute; inset: 4px; background: #000; border-radius: 6px; }
        .turkish-flag { width: 90px; z-index: 2; position: relative; filter: drop-shadow(0 0 10px red); }

        /* Yazı Grubu ve Bordo-Mavi Neon */
        .welcome-box {
            position: relative; padding: 20px 40px; border-radius: 15px; overflow: hidden;
        }
        .welcome-box::before {
            content: ''; position: absolute; inset: 0;
            background: conic-gradient(var(--neon-bordo), var(--neon-mavi), var(--neon-bordo), var(--neon-mavi));
            animation: rotate 4s linear infinite reverse;
        }
        .welcome-box::after { content: ''; position: absolute; inset: 3px; background: rgba(0,0,0,0.9); border-radius: 12px; }
        
        .welcome-text { font-size: 2.2rem; font-weight: 900; letter-spacing: 3px; color: white; position: relative; z-index: 2; margin-bottom: 5px; }
        .loading-text { font-size: 0.9rem; color: var(--neon-mavi); letter-spacing: 5px; position: relative; z-index: 2; animation: blink 1.5s infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* ========================================= */
        /* ANA İÇERİK VE ARKA PLAN                    */
        /* ========================================= */
        #content { display: none; opacity: 0; width: 90%; max-width: 450px; margin: 40px auto; text-align: center; }
        
        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: url('https://pbs.twimg.com/media/F4Kz-WqX0AAZp8u.jpg:large') center/cover no-repeat;
            opacity: 0.5; /* %50 Şeffaflık */
        }
        .main-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
        }

        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 35px; text-shadow: 0 0 15px var(--neon-bordo); }

        .btn {
            position: relative; display: flex; align-items: center; padding: 20px;
            background: rgba(0,0,0,0.85); color: white; text-decoration: none;
            margin-bottom: 20px; border-radius: 12px; font-weight: 700;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .btn::before {
            content: ''; position: absolute; top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotate 3s linear infinite; z-index: -1;
        }
        .btn::after { content: ''; position: absolute; inset: 2px; background: #0a0a0a; border-radius: 10px; z-index: -1; }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 0 20px var(--neon-mavi); }
        .btn i { width: 35px; margin-right: 15px; font-size: 1.4rem; }

        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-bg"></div>
        <div class="flag-box">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" alt="TR" class="turkish-flag">
        </div>
        <div class="welcome-box">
            <div class="welcome-text">HOŞ GELDİNİZ</div>
            <div class="loading-text">YÜKLENİYOR...</div>
        </div>
    </div>

    <div class="main-bg"></div>
    <div class="main-overlay"></div>

    <div id="content">
        <h1>GİRAY KAÇAR</h1>
        <a href="https://kick.com/remzigiraykacar" class="btn" target="_blank"><i class="fa-solid fa-bolt kick-icon"></i> KİCK KANALIM</a>
        <a href="https://www.instagram.com/giraykacarr" class="btn" target="_blank"><i class="fa-brands fa-instagram insta-icon"></i> INSTAGRAM</a>
        <a href="https://www.instagram.com/remzigiraykacar" class="btn" target="_blank"><i class="fa-brands fa-square-instagram insta-icon"></i> YOUTUBE INSTAGRAM</a>
        <a href="https://m.youtube.com/%40remzigiraykacar23" class="btn" target="_blank"><i class="fa-brands fa-youtube yt-icon"></i> YOUTUBE KANALIM</a>
        <a href="https://www.instagram.com/channel/AbbrjxNCkqs-cvzb/" class="btn" target="_blank"><i class="fa-solid fa-users" style="color: #00ffff;"></i> INSTAGRAM TOPLULUK</a>
        <a href="https://www.instagram.com/1bordo1mavii" class="btn" target="_blank"><i class="fa-solid fa-star" style="color: #ff1e1e;"></i> 1BORDO1MAVİİ</a>
    </div>

    <script>
        // Sayfa yüklendiğinde çalışacak kesin komut
        window.onload = function() {
            setTimeout(function() {
                var loader = document.getElementById('loader');
                var content = document.getElementById('content');
                
                loader.style.opacity = '0';
                setTimeout(function() {
                    loader.style.display = 'none';
                    content.style.display = 'block';
                    setTimeout(function() { content.style.opacity = '1'; }, 50);
                }, 800);
            }, 3000); // 3 saniye animasyon süresi
        };
    </script>
</body>
</html>
