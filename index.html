<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Resmi Bağlantılar</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #6495ED;
            --neon-bordo: #ff0000;
            --neon-mavi: #00ffff;
            --karanlik: #050505;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--karanlik); color: white; margin: 0; overflow: hidden; }

        /* ========================================= */
        /* TRABZONSPOR TEMALI GİRİŞ EKRANI (LOADER)  */
        /* ========================================= */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background: radial-gradient(circle, rgba(128,0,0,0.4) 0%, rgba(5,5,5,1) 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease-out;
        }

        #loader .welcome-text {
            font-size: 3.5rem; color: white; font-weight: 900; letter-spacing: 5px;
            margin-bottom: 10px; text-transform: uppercase;
            text-shadow: 0 0 20px var(--mavi);
            animation: bounceIn 1s ease;
        }

        #loader .loading-text {
            font-size: 1.2rem; color: var(--neon-mavi); letter-spacing: 8px;
            animation: pulse-neon 1.5s infinite; text-transform: uppercase;
        }

        @keyframes pulse-neon {
            0% { opacity: 0.4; text-shadow: 0 0 5px var(--mavi); }
            50% { opacity: 1; text-shadow: 0 0 20px var(--neon-mavi); }
            100% { opacity: 0.4; text-shadow: 0 0 5px var(--mavi); }
        }

        /* ========================================= */
        /* ANA SAYFA VE NEON BUTONLAR                */
        /* ========================================= */
        #content {
            display: none; opacity: 0;
            width: 90%; max-width: 450px; text-align: center;
            margin: 40px auto; transition: opacity 1s ease-in;
        }

        .main-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #050505 0%, #1a0000 100%);
            z-index: -1;
        }

        h1 {
            font-size: 2.8rem; color: white; font-weight: 900;
            letter-spacing: 2px; margin-bottom: 40px; text-transform: uppercase;
            text-shadow: 2px 2px 0px var(--bordo), -2px -2px 0px var(--mavi);
        }

        .btn {
            position: relative;
            display: flex; align-items: center; justify-content: flex-start;
            color: white; text-decoration: none;
            margin-bottom: 25px; padding: 22px; border-radius: 15px;
            font-weight: 700; font-size: 1.1rem;
            background: rgba(10, 10, 10, 0.9);
            overflow: hidden; transition: 0.3s;
        }

        .btn i { margin-right: 20px; font-size: 1.6rem; width: 40px; text-align: center; }

        /* Neon Dönen Işık Efekti */
        .btn::before {
            content: ''; position: absolute;
            top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotate-neon 3s linear infinite;
            z-index: -1;
        }

        .btn::after {
            content: ''; position: absolute;
            inset: 3px; background: #0f0f0f; 
            border-radius: 12px; z-index: -1;
        }

        @keyframes rotate-neon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(100, 149, 237, 0.5);
        }

        /* İkon Renkleri */
        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
        .bm-icon { color: var(--mavi); }

    </style>
</head>
<body>

    <div id="loader">
        <div class="welcome-text">HOŞ GELDİNİZ</div>
        <div class="loading-text">YÜKLENİYOR...</div>
    </div>

    <div class="main-bg"></div>

    <div id="content">
        <h1>GİRAY KAÇAR</h1>

        </a>

        </a>
        
        <a href="https://www.instagram.com/remzigiraykacar?igsh=MWdhanBwdzJzemc0Mg==" class="btn" target="_blank">

        <a href="https://m.youtube.com/%40remzigiraykacar23?fbclid=PAb21jcARaTnFleHRuA2FlbQIxMQBzcnRjBmFwcF9pZA81NjcwNjczNDMzNTI0MjcAAac2StlFZr8dTPU8Gk1fZqSabzbC8OCtffEKYHCTc2pPsk1EMARYJe87AjrAlw_aem_Z5l9kT59S94kHcpY2cdtig" class="btn" target="_blank">
            <i class="fa-brands fa-youtube yt-icon"></i>  YOUTUBE KANALIM

        <a href="https://www.instagram.com/channel/AbbrjxNCkqs-cvzb/" class="btn" target="_blank">

        <div style="height: 50px;"></div>

    <script>
        window.addEventListener("load", function() {
            const loader = document.getElementById("loader");
            const content = document.getElementById("content");

            setTimeout(() => {
                loader.style.opacity = "0";
                setTimeout(() => {
                    loader.style.display = "none";
                    content.style.display = "block";
                    setTimeout(() => { content.style.opacity = "1"; }, 50);
                    document.body.style.overflow = "auto";
                }, 800);
            }, 2500); 
        });
    </script>

</body>
