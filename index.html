<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Resmi Fırtına</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #1e3a8a;
            --neon-bordo: #ff1e1e;
            --neon-mavi: #00ffff;
            --zemin: #010103;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--zemin); color: white; overflow-x: hidden; }

        /* ========================================= */
        /* YENİ EFSANEVİ GİRİŞ EKRANI (LOADER) V3    */
        /* ========================================= */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background-color: var(--zemin);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; /* Her şeyi ortalar */
            z-index: 9999; transition: opacity 1s ease-out;
            text-align: center; /* İçindeki metinleri ortalar */
        }

        /* Logolar ve Bayrak Alanı */
        .loader-logos {
            display: flex; gap: 25px; /* Aradaki boşluk */
            margin-bottom: 25px; /* Yazıdan uzaklık */
            animation: bounceIn 1s ease;
        }

        .loader-logos img {
            height: 90px; /* Logo yüksekliği */
            width: auto; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* Bayrak için özel parlama */
        .turkish-flag { filter: drop-shadow(0 0 20px var(--neon-bordo)) !important; }
        /* TS Logosu için özel parlama */
        .ts-logo { filter: drop-shadow(0 0 20px var(--neon-mavi)) !important; }

        .welcome-text { 
            font-size: 3rem; font-weight: 900; letter-spacing: 5px; 
            text-shadow: 0 0 25px var(--neon-mavi); margin: 0 0 10px 0;
            text-transform: uppercase;
        }
        .loading-text { 
            font-size: 1.1rem; color: var(--neon-mavi); 
            letter-spacing: 6px; animation: pulse 1.5s infinite;
            text-transform: uppercase; margin: 0;
        }

        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ========================================= */
        /* ARKA PLAN KATMANLARI VE ANA İÇERİK        */
        /* ========================================= */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            background: linear-gradient(135deg, #050505 0%, #1a0000 50%, #00081a 100%);
            background-size: 400% 400%; animation: fluidBG 15s ease infinite;
        }
        .texture-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4MDAwMDAiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
            opacity: 0.2;
        }
        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }

        #content {
            display: none; opacity: 0; width: 90%; max-width: 450px;
            text-align: center; margin: 40px auto; transition: opacity 1s ease-in;
        }

        h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 40px; text-shadow: 2px 2px 0px var(--bordo), -2px -2px 0px var(--mavi); text-transform: uppercase; }

        .btn {
            position: relative; display: flex; align-items: center;
            color: white; text-decoration: none; margin-bottom: 25px;
            padding: 22px; border-radius: 15px; font-weight: 700;
            background: rgba(10, 10, 10, 0.9); overflow: hidden; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .btn i { margin-right: 20px; font-size: 1.6rem; width: 40px; text-align: center; }
        .btn::before {
            content: ''; position: absolute; top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotate 3s linear infinite; z-index: -1;
        }
        .btn::after { content: ''; position: absolute; inset: 3px; background: #0f0f0f; border-radius: 12px; z-index: -1; }

        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(100, 149, 237, 0.4); }

        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
        .bm-icon { color: var(--mavi); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/b/b4/Flag_of_Turkey.svg" alt="Türk Bayrağı" class="turkish-flag">
            <img src="https://upload.wikimedia.org/wikipedia/tr/thumb/a/ab/Trabzonspor_logo.svg/1200px-Trabzonspor_logo.svg.png" alt="Trabzonspor Logosu" class="ts-logo">
        </div>
        <div class="welcome-text">HOŞ GELDİNİZ</div>
        <div class="loading-text">YÜKLENİYOR...</div>
    </div>

    <div class="bg-layer"></div>
    <div class="texture-layer"></div>
    <div id="particles-js"></div>

    <div id="content">
        <h1>GİRAY KAÇAR</h1>

        <a href="https://kick.com/remzigiraykacar" class="btn" target="_blank">
            <i class="fa-solid fa-bolt kick-icon"></i> 1 KİCK KANALIM
        </a>
        <a href="https://www.instagram.com/giraykacarr?igsh=MXJoMGVhenJ4anB3NQ==" class="btn" target="_blank">
            <i class="fa-brands fa-instagram insta-icon"></i> 2 INSTAGRAM HESABIM
        </a>
        <a href="https://www.instagram.com/remzigiraykacar?igsh=MWdhanBwdzJzemc0Mg==" class="btn" target="_blank">
            <i class="fa-brands fa-square-instagram insta-icon"></i> 3 YOUTUBE KANAL INSTAGRAM
        </a>
        <a href="https://m.youtube.com/%40remzigiraykacar23" class="btn" target="_blank">
            <i class="fa-brands fa-youtube yt-icon"></i> 4 YOUTUBE KANALIM
        </a>
        <a href="https://www.instagram.com/channel/AbbrjxNCkqs-cvzb/" class="btn" target="_blank">
            <i class="fa-solid fa-users bm-icon"></i> 5 INSTAGRAM TOPLULUK
        </a>
        <a href="https://www.instagram.com/1bordo1mavii?igsh=YWF4enV0ZG01NXc0" class="btn" target="_blank">
            <i class="fa-solid fa-star-half-stroke bm-icon" style="color: #ff1e1e;"></i> 6 1BORDO1MAVİİ
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // İNTERAKTİF PARÇACIK AYARLARI
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80 },
                "color": { "value": ["#800000", "#6495ED"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": false },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": true }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.5 } } }
            }
        });

        // Yüklenme Ekranı Scripti (3 saniyeye ayarlandı)
        window.addEventListener("load", function() {
            setTimeout(() => {
                document.getElementById("loader").style.opacity = "0";
                setTimeout(() => {
                    document.getElementById("loader").style.display = "none";
                    document.getElementById("content").style.display = "block";
                    setTimeout(() => { document.getElementById("content").style.opacity = "1"; }, 50);
                }, 1000); // Kaybolma hızı
            }, 3000); // Bekleme süresi
        });
    </script>
</body>
</html>
