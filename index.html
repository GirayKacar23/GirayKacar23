<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GİRAY KAÇAR | Resmi Efsane Sayfası</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bordo: #800000;
            --mavi: #1e3a8a;
            --neon-bordo: #ff1e1e;
            --neon-mavi: #00ffff;
            --zemin: #010103;
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Poppins', sans-serif; background: var(--zemin); color: white; overflow-x: hidden; }

        /* ========================================= */
        /* GİRİŞ EKRANI (LOGOLAR SABİTLENDİ)          */
        /* ========================================= */
        #loader {
            position: fixed; width: 100%; height: 100vh;
            background-color: var(--zemin); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease-out; text-align: center;
        }
        .loader-logos { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 30px; }
        
        /* Logoların Boyutları */
        .loader-logos img { 
            height: 110px; 
            width: auto; 
            object-fit: contain;
            display: block;
        }

        .turkish-flag { filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.8)); }
        /* Logo parlaması */
        .ts-logo { filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.6)); background: transparent; }

        .welcome-text { font-size: 3rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 25px var(--neon-mavi); margin: 0 0 10px 0; text-transform: uppercase; }
        .loading-text { font-size: 1.1rem; color: var(--neon-mavi); letter-spacing: 6px; animation: pulse 1.5s infinite; text-transform: uppercase; margin: 0; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* ========================================= */
        /* EFSANE ARKA PLAN (GİRAY KAÇAR FOTOĞRAFI)  */
        /* ========================================= */
        .bg-legend-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -3;
            overflow: hidden; background-color: #000;
        }
        .legend-photo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://i.imgur.com/KEnZ6iF.jpeg'); /* Alternatif hızlı link */
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0.35; 
            filter: grayscale(20%) contrast(120%);
        }
        /* Eğer yukarıdaki Imgur linki patlarsa diye yedek görsel */
        .legend-photo-fallback {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://img.fanatik.com.tr/img/75/1200x675/5f1b619666a97c4180479153.jpg');
            background-size: cover; background-position: center; opacity: 0.35; z-index: -1;
        }

        .legend-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(1,1,3,0.95) 100%);
        }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1; }

        /* ========================================= */
        /* İÇERİK VE BUTONLAR                        */
        /* ========================================= */
        #content {
            display: none; opacity: 0; width: 90%; max-width: 450px;
            text-align: center; margin: 40px auto; transition: opacity 1s ease-in;
        }
        h1 { font-size: 2.8rem; font-weight: 900; margin-bottom: 40px; text-shadow: 2px 2px 0px var(--bordo), -2px -2px 0px var(--mavi); text-transform: uppercase; }
        .btn {
            position: relative; display: flex; align-items: center;
            color: white; text-decoration: none; margin-bottom: 25px;
            padding: 22px; border-radius: 15px; font-weight: 700;
            background: rgba(0, 0, 0, 0.8); overflow: hidden; transition: 0.3s;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05);
        }
        .btn i { margin-right: 20px; font-size: 1.6rem; width: 40px; text-align: center; }
        .btn::before {
            content: ''; position: absolute; top: -150%; left: -50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, var(--bordo), var(--mavi), transparent 70%);
            animation: rotate 3s linear infinite; z-index: -1;
        }
        .btn::after { content: ''; position: absolute; inset: 3px; background: #0a0a0a; border-radius: 12px; z-index: -1; }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 0 30px rgba(100, 149, 237, 0.4); }

        .kick-icon { color: #53fc18; }
        .insta-icon { color: #e1306c; }
        .yt-icon { color: #ff0000; }
        .bm-icon { color: #00ffff; }
    </style>
</head>
